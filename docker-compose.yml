version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: e20shield_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-e20user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-e20pass}
      POSTGRES_DB: ${POSTGRES_DB:-e20shield}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-e20user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: e20shield_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: e20shield_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-e20user}:${POSTGRES_PASSWORD:-e20pass}@db:5432/${POSTGRES_DB:-e20shield}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
    container_name: e20shield_celery
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-e20user}:${POSTGRES_PASSWORD:-e20pass}@db:5432/${POSTGRES_DB:-e20shield}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
    volumes:
      - ./backend:/app
    command: celery -A services.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    container_name: e20shield_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  db_data:
